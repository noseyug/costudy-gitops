  apiVersion: cert-manager.io/v1
  kind: ClusterIssuer
  metadata:
    name: letsencrypt-dev
  spec:
    acme:
      server: https://acme-staging-v02.api.letsencrypt.org/directory
      email: noseyug@gmail.com
      privateKeySecretRef:
        name: letsencrypt-staging-key
      solvers:
        - dns01:
            cloudflare:
              apiTokenSecretRef:
                name: cloudflare-api-token-secret
                key: api-token
